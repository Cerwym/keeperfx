name: CI WebAssembly

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-wasm:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/keeperfx-build-wasm:latest
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Mark git directory as safe
        run: git config --global --add safe.directory '*'

      - name: Configure CMake
        run: cmake --preset wasm-release
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 4

      - name: Build
        run: cmake --build --preset wasm-release
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 4

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keeperfx-wasm
          path: |
            out/build/wasm-release/*.wasm
            out/build/wasm-release/*.js
            out/build/wasm-release/*.html
          if-no-files-found: warn

