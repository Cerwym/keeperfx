name: CI Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      registry_owner: ${{ steps.lower.outputs.owner }}
    steps:
      - id: lower
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    container:
      image: ghcr.io/${{ needs.prepare.outputs.registry_owner }}/keeperfx-build-${{ matrix.image }}:latest
      options: --user root

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86
            image: mingw32
            preset: windows-x86-release
            artifact-name: keeperfx-windows-x86

          - name: Windows x64
            image: mingw64
            preset: windows-x64-release
            artifact-name: keeperfx-windows-x64

          - name: Linux x64
            image: linux
            preset: linux-x64-release
            artifact-name: keeperfx-linux-x64

          - name: Linux x64 (ASAN)
            image: linux
            preset: linux-x64-asan
            artifact-name: keeperfx-linux-x64-asan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Mark git directory as safe
        run: git config --global --add safe.directory '*'

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 4

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 4

      - name: Run tests (ASAN)
        if: contains(matrix.preset, 'asan')
        run: ./out/build/${{ matrix.preset }}/tests
        env:
          ASAN_OPTIONS: "detect_leaks=0:halt_on_error=1:print_stats=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            out/build/${{ matrix.preset }}/keeperfx*
            out/build/${{ matrix.preset }}/*.exe
            out/build/${{ matrix.preset }}/*.map
            out/build/${{ matrix.preset }}/*.dll
          if-no-files-found: warn

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All builds passed!"
            exit 0
          else
            echo "❌ One or more builds failed"
            exit 1
          fi

