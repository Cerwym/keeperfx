name: Alpha Patches (Unsigned)

on:
  workflow_call:
    outputs:
      artifact-id:
        description: "The ID of the uploaded artifact"
        value: ${{ jobs.build-alpha-patch-unsigned.outputs.artifact-id }}
      zip-name:
        description: "The name of the ZIP file without extension"
        value: ${{ jobs.build-alpha-patch-unsigned.outputs.zip-name }}
  workflow_dispatch:

jobs:
  build-alpha-patch-unsigned:

    name: "Build Alpha Patch (Unsigned)"
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/keeperfx-build-mingw32:latest
      options: --user root

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Mark git directory as safe
      run: git config --global --add safe.directory '*'

    - name: Install packaging tools
      run: |
        set -eux
        apt-get update -qq
        apt-get install -y --no-install-recommends 7zip make
        pip3 install dkfans-setup-cpp 2>/dev/null || true

    - uses: dkfans/setup-cpp@master

    - name: Set build variables
      run: |
        echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
        echo "PACKAGE_SUFFIX=Alpha" >> "$GITHUB_ENV"

    - name: Build (CMake)
      run: |
        set -eux
        cmake --preset windows-x86-release
        cmake --build --preset windows-x86-release
      env:
        CMAKE_BUILD_PARALLEL_LEVEL: 4

    - name: Package graphics data
      run: |
        set -eux
        make BUILD_NUMBER=$BUILD_NUMBER PACKAGE_SUFFIX=$PACKAGE_SUFFIX pkg-enginegfx

    - name: Copy SDL2 DLLs for packaging
      run: |
        set -eux
        mkdir -p sdl/for_final_package
        cp /usr/i686-w64-mingw32/bin/SDL2.dll       sdl/for_final_package/
        cp /usr/i686-w64-mingw32/bin/SDL2_mixer.dll  sdl/for_final_package/
        cp /usr/i686-w64-mingw32/bin/SDL2_image.dll  sdl/for_final_package/
        cp /usr/i686-w64-mingw32/bin/SDL2_net.dll    sdl/for_final_package/

    - name: Create release package
      run: |
        set -eux
        make BUILD_NUMBER=$BUILD_NUMBER PACKAGE_SUFFIX=$PACKAGE_SUFFIX package
        echo "ZIP_NAME=$(basename -s .7z pkg/keeperfx*.7z)" >> "$GITHUB_ENV"
        rm pkg/keeperfx*.7z

    - name: Upload artifact
      id: upload-artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: pkg/**
      
    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}
      zip-name: ${{ env.ZIP_NAME }}