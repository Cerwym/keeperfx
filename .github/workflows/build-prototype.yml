name: Test Prototypes

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, review_requested]
    branches: [ "**" ]

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      registry_owner: ${{ steps.lower.outputs.owner }}
    steps:
      - id: lower
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

  build-prototype:
    name: "Prototype ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: prepare
    container:
      image: ghcr.io/${{ needs.prepare.outputs.registry_owner }}/keeperfx-build-${{ matrix.image }}:latest
      options: --user root

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86
            image: mingw32
            preset: windows-x86-release

          - name: Windows x64
            image: mingw64
            preset: windows-x64-release

          - name: Linux x64
            image: linux
            preset: linux-x64-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Mark git directory as safe
        run: git config --global --add safe.directory '*'

      - name: Set prototype suffix
        run: |
          GITHUB_SHA=$(cat "$GITHUB_EVENT_PATH" | python3 -c "import sys,json; print(json.load(sys.stdin)['pull_request']['head']['sha'])")
          echo "PACKAGE_SUFFIX=Prototype_$(git rev-parse --short=7 $GITHUB_SHA)" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$(git rev-list --count origin/master)" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }} -DPACKAGE_SUFFIX=${{ env.PACKAGE_SUFFIX }} -DBUILD_NUMBER=${{ env.BUILD_NUMBER }}
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 4

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 4

      - name: Upload prototype artifact
        uses: actions/upload-artifact@v4
        with:
          name: keeperfx-prototype-${{ matrix.preset }}-${{ env.PACKAGE_SUFFIX }}
          path: |
            out/build/${{ matrix.preset }}/keeperfx*
            out/build/${{ matrix.preset }}/*.exe
            out/build/${{ matrix.preset }}/*.dll
            out/build/${{ matrix.preset }}/*.map
          if-no-files-found: warn

